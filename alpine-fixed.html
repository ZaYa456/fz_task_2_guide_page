<!DOCTYPE html>
<html :lang="lang" x-data="dashboard()" :class="{ 'rtl': lang === 'ar' }">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title x-text="translations.pageTitle[lang]">Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body>
    <div class="guide-container">
        <!-- Sidebar -->
        <aside class="sidebar" :class="{ 'open': isMobileMenuOpen }">
            <div class="sidebar-header">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <h1 class="sidebar-title" x-text="translations.sidebarTitle[lang]">Dashboard Guide</h1>
                    <button @click="toggleLanguage()"
                        style="background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 0.5rem 1rem; border-radius: 0.375rem; cursor: pointer; font-family: Figtree, sans-serif; font-size: 0.875rem; font-weight: 500; transition: all 0.2s;"
                        x-text="lang === 'en' ? 'AR' : 'EN'">
                    </button>
                </div>
                <p class="sidebar-subtitle" x-text="translations.sidebarSubtitle[lang]">Everything you need to manage
                    your restaurant</p>
            </div>

            <!-- Search -->
            <div class="search-container">
                <input type="text" class="search-box" :placeholder="translations.searchPlaceholder[lang]"
                    x-model="searchQuery" @input.debounce.300ms="filterNav()">
            </div>

            <!-- Navigation -->
            <nav class="nav-section">
                <template x-for="cat in filteredNav" :key="cat.category">
                    <div>
                        <!-- Category header -->
                        <div class="nav-category" x-text="cat.category[lang]"></div>

                        <!-- Links in this category -->
                        <template x-for="link in cat.links" :key="link.id">
                            <a class="nav-link"
                                :class="{ 'active': currentSection === link.id, 'nav-sublink': link.isSublink }"
                                @click="selectSection(link.id)" x-text="link.title[lang]"></a>
                        </template>
                    </div>
                </template>
            </nav>
        </aside>

        <!-- Mobile Menu Toggle -->
        <button class="mobile-menu-toggle" @click="toggleMobileMenu()" x-show="windowWidth <= 768">
            &#9776;
        </button>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Single content section that shows/hides based on currentSection -->
            <section class="content-section" x-show="currentSection" :id="`section-${currentSection}`">
                <div class="subsection" :id="currentSection">
                    <!-- Skeleton while loading -->
                    <template x-if="!loadedSubsections[currentSection]">
                        <div class="skeleton-wrapper">
                            <div class="skeleton skeleton-title"></div>
                            <div class="skeleton skeleton-text"></div>
                            <div class="skeleton skeleton-text skeleton-text--short"></div>
                            <div class="skeleton skeleton-video"></div>
                        </div>
                    </template>

                    <!-- Loaded content -->
                    <template x-if="loadedSubsections[currentSection]">
                        <div x-html="loadedSubsections[currentSection]"></div>
                    </template>
                </div>
            </section>

            <!-- No Results Message -->
            <div class="no-results" x-show="filteredNav.length === 0" x-cloak>
                <div class="no-results-icon" x-text="translations.noResultsText.icon[lang]">🔍</div>
                <div class="no-results-title" x-text="translations.noResultsText.title[lang]">No Results Found</div>
                <div class="no-results-text" x-text="translations.noResultsText.desc[lang]">
                    Try different keywords or browse the sections.
                </div>
            </div>
        </main>

        <!-- Scroll to Top -->
        <button class="scroll-to-top" @click="scrollToTop()" x-show="showScrollTop" x-cloak aria-label="Scroll to top">
            ↑
        </button>
    </div>

    <script>
        function dashboard() {
            return {
                // ========================================
                // State
                // ========================================
                lang: localStorage.getItem('dashboardLang') || 'en',
                currentSection: null,
                loadedSubsections: {},
                searchQuery: '',
                filteredNav: [],
                isMobileMenuOpen: false,
                showScrollTop: false,
                windowWidth: window.innerWidth,

                // ========================================
                // Navigation Structure
                // ========================================
                navItems: [
                    {
                        category: { en: 'Getting Started', ar: 'البدء' },
                        links: [
                            { id: 'dashboard-overview', title: { en: 'Dashboard Overview', ar: 'نظرة عامة على لوحة التحكم' } },
                            { id: 'changing-language', title: { en: 'Changing Language', ar: 'تغيير اللغة' } },
                        ]
                    },
                    {
                        category: { en: 'Profile Management', ar: 'إدارة الملف الشخصي' },
                        links: [
                            { id: 'profile-username', title: { en: 'Update Username', ar: 'تحديث اسم المستخدم' } },
                            { id: 'profile-email', title: { en: 'Update Email', ar: 'تحديث البريد الإلكتروني' } },
                            { id: 'profile-password', title: { en: 'Update Password', ar: 'تحديث كلمة المرور' } },
                            { id: 'profile-delete', title: { en: 'Delete Account', ar: 'حذف الحساب' } },
                        ]
                    },
                    {
                        category: { en: 'Restaurant Setup', ar: 'إعداد المطعم' },
                        links: [
                            { id: 'settings-overview', title: { en: 'Settings Overview', ar: 'نظرة عامة على الإعدادات' } },
                            { id: 'settings-logo', title: { en: 'Upload Logo', ar: 'تحميل الشعار' }, isSublink: true },
                            { id: 'settings-cover', title: { en: 'Upload Cover Photo', ar: 'تحميل صورة الغلاف' }, isSublink: true },
                            { id: 'settings-info', title: { en: 'Restaurant Information', ar: 'معلومات المطعم' }, isSublink: true },
                            { id: 'settings-colors', title: { en: 'Brand Colors', ar: 'ألوان العلامة التجارية' }, isSublink: true },
                            { id: 'settings-qr', title: { en: 'QR Code for Menu', ar: 'رمز QR للقائمة' }, isSublink: true },
                            { id: 'settings-social', title: { en: 'Social Media Links', ar: 'روابط وسائل التواصل' }, isSublink: true },
                            { id: 'settings-other', title: { en: 'Other Settings', ar: 'إعدادات أخرى' }, isSublink: true },
                        ]
                    },
                    {
                        category: { en: 'Menu Management', ar: 'إدارة القائمة' },
                        links: [
                            { id: 'categories-overview', title: { en: 'Categories Overview', ar: 'نظرة عامة على الفئات' } },
                            { id: 'categories-add', title: { en: 'Add Category', ar: 'إضافة فئة' }, isSublink: true },
                            { id: 'categories-excel', title: { en: 'Import/Export Excel', ar: 'استيراد/تصدير Excel' }, isSublink: true },
                            { id: 'categories-search', title: { en: 'Search Categories', ar: 'البحث في الفئات' }, isSublink: true },

                            { id: 'products-overview', title: { en: 'Products Overview', ar: 'نظرة عامة على المنتجات' } },
                            { id: 'products-add', title: { en: 'Add Product', ar: 'إضافة منتج' }, isSublink: true },
                            { id: 'products-excel', title: { en: 'Import/Export Excel', ar: 'استيراد/تصدير Excel' }, isSublink: true },
                            { id: 'products-filter', title: { en: 'Filter Products', ar: 'تصفية المنتجات' }, isSublink: true },
                            { id: 'products-pin', title: { en: 'Pin Products', ar: 'تثبيت المنتجات' }, isSublink: true },
                        ]
                    },
                    {
                        category: { en: 'Team Management', ar: 'إدارة الفريق' },
                        links: [
                            { id: 'users-overview', title: { en: 'Users Overview', ar: 'نظرة عامة على المستخدمين' } },
                            { id: 'users-add', title: { en: 'Add New User', ar: 'إضافة مستخدم جديد' }, isSublink: true },
                            { id: 'users-edit', title: { en: 'Edit User', ar: 'تعديل المستخدم' }, isSublink: true },
                        ]
                    },
                    {
                        category: { en: 'Customer Experience', ar: 'تجربة العملاء' },
                        links: [
                            { id: 'public-menu-overview', title: { en: 'Public Menu Overview', ar: 'نظرة عامة على القائمة العامة' } },
                            { id: 'public-menu-search', title: { en: 'Search & Browse', ar: 'البحث والتصفح' }, isSublink: true },
                            { id: 'public-menu-cart', title: { en: 'Add to Cart', ar: 'إضافة إلى السلة' }, isSublink: true },
                            { id: 'public-menu-whatsapp', title: { en: 'WhatsApp Orders', ar: 'طلبات واتساب' }, isSublink: true },
                            { id: 'public-menu-language', title: { en: 'Language & Dark Mode', ar: 'اللغة والوضع الداكن' }, isSublink: true },
                            { id: 'public-menu-about', title: { en: 'About Us Section', ar: 'قسم من نحن' }, isSublink: true },
                        ]
                    },
                    {
                        category: { en: 'Analytics & Billing', ar: 'التحليلات والفواتير' },
                        links: [
                            { id: 'reports', title: { en: 'Reports & Analytics', ar: 'التقارير والتحليلات' } },
                            { id: 'billing', title: { en: 'Billing & Subscription', ar: 'الفواتير والاشتراك' } },
                        ]
                    },
                    {
                        category: { en: 'Help', ar: 'المساعدة' },
                        links: [
                            { id: 'faq', title: { en: 'FAQ & Troubleshooting', ar: 'الأسئلة الشائعة واستكشاف الأخطاء' } },
                        ]
                    },
                ],

                // ========================================
                // Translations
                // ========================================
                translations: {
                    sidebarTitle: { en: 'Dashboard Guide', ar: 'دليل لوحة التحكم' },
                    sidebarSubtitle: { en: 'Everything you need to manage your restaurant', ar: 'كل ما تحتاجه لإدارة مطعمك' },
                    pageTitle: { en: 'Welcome to Your Dashboard', ar: 'مرحباً بك في لوحة التحكم' },
                    pageDescription: {
                        en: 'This comprehensive guide will help you navigate and make the most of your restaurant dashboard. Use the sidebar to jump to specific sections, or use the search function to find exactly what you need.',
                        ar: 'سيساعدك هذا الدليل الشامل في التنقل وتحقيق أقصى استفادة من لوحة تحكم مطعمك. استخدم الشريط الجانبي للانتقال إلى أقسام محددة، أو استخدم وظيفة البحث للعثور على ما تحتاجه بالضبط.'
                    },
                    searchPlaceholder: { en: 'Search guide...', ar: 'ابحث في الدليل...' },
                    noResultsText: {
                        icon: { en: '🔍', ar: '🔍' },
                        title: { en: 'No Results Found', ar: 'لا توجد نتائج' },
                        desc: {
                            en: 'We couldn\'t find any content matching your search. Try different keywords or browse the sections using the navigation menu.',
                            ar: 'لم نتمكن من العثور على أي محتوى يطابق بحثك. جرب كلمات رئيسية مختلفة أو تصفح الأقسام باستخدام قائمة التنقل.'
                        }
                    }
                },

                // ========================================
                // Initialization
                // ========================================
                init() {
                    // Set filtered nav initially
                    this.filteredNav = this.navItems;

                    // Check for hash in URL, otherwise load first section
                    const hash = window.location.hash.substring(1);
                    const firstSection = hash || this.navItems[0]?.links[0]?.id;
                    if (firstSection) this.selectSection(firstSection);

                    // Scroll event for "scroll to top" button
                    window.addEventListener('scroll', () => {
                        this.showScrollTop = window.scrollY > 400;
                    });

                    // Window resize for mobile detection
                    window.addEventListener('resize', () => {
                        this.windowWidth = window.innerWidth;
                    });

                    // Browser back/forward navigation
                    window.addEventListener('popstate', (e) => {
                        const sectionId = e.state?.section || this.navItems[0]?.links[0]?.id;
                        if (sectionId) this.selectSection(sectionId);
                    });
                },

                // ========================================
                // Methods
                // ========================================
                toggleMobileMenu() {
                    this.isMobileMenuOpen = !this.isMobileMenuOpen;
                },

                toggleLanguage() {
                    this.lang = this.lang === 'en' ? 'ar' : 'en';
                    localStorage.setItem('dashboardLang', this.lang);
                },

                scrollToTop() {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },

                filterNav() {
                    if (!this.searchQuery) {
                        this.filteredNav = this.navItems;
                        return;
                    }

                    const q = (this.searchQuery || '').toLowerCase();
                    this.filteredNav = this.navItems.map(cat => {
                        const links = cat.links.filter(link => {
                            const en = (link.title?.en || '').toLowerCase();
                            const ar = (link.title?.ar || '').toLowerCase();
                            return en.includes(q) || ar.includes(q);
                        });
                        return { ...cat, links };
                    }).filter(cat => cat.links.length > 0);
                },

                async selectSection(id) {
                    this.currentSection = id;

                    // Lazy load content if not already loaded
                    if (!this.loadedSubsections[id]) {
                        const containerHTML = await this.fetchSubsection(id);
                        this.loadedSubsections[id] = containerHTML;

                        // FAQ special case: re-initialize accordion after Alpine renders
                        if (id === 'faq') {
                            this.$nextTick(() => this.initFaq(id));
                        }
                    }

                    // Close mobile menu
                    if (this.windowWidth <= 768) this.isMobileMenuOpen = false;

                    // Update URL hash
                    history.pushState({ section: id }, '', `#${id}`);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                },

                async fetchSubsection(id) {
                    try {
                        const res = await fetch(`subsections/${id}.html`);
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        return await res.text();
                    } catch (err) {
                        console.error(`Error loading subsection ${id}:`, err);
                        return `<div class="load-error"><span class="load-error-icon">⚠️</span><span>Failed to load content. Please refresh the page.</span></div>`;
                    }
                },

                initFaq(id) {
                    // After Alpine has rendered the HTML via x-html
                    const container = document.getElementById(id);
                    if (!container) return;

                    container.querySelectorAll('.faq-question').forEach(q => {
                        q.addEventListener('click', () => {
                            q.closest('.faq-item').classList.toggle('open');
                        });
                    });
                }
            }
        }
    </script>

    <style>
        /* Alpine.js cloak helper */
        [x-cloak] {
            display: none !important;
        }
    </style>
</body>

</html>
